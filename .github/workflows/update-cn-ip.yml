name: Update CN IP list

on:
  schedule:
    - cron: "0 3 * * 4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download cn.txt
        run: curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/cn.txt" -o /tmp/cn.txt

      - name: Write into assets/cn-ip-list.js
        run: |
          {
            echo "// 中国 IPv4/IPv6 CIDR 列表（来源 Loyalsoldier/geoip，自动更新）"
            printf 'window.CN_IP_LIST = '
            node -e 'const fs=require("fs");const t=fs.readFileSync("/tmp/cn.txt","utf8").split(/\r?\n/).map(s=>s.trim()).filter(Boolean).join("\n");process.stdout.write(JSON.stringify(t));'
            echo ";"
          } > assets/cn-ip-list.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/cn-ip-list.js
          if ! git diff --cached --quiet; then
            git commit -m "chore: update CN IP list ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes"
          fi
